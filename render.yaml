services:
  - type: web
    name: timesfm-backend
    runtime: python
    rootDir: timesfm-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MEXC_BASE_URL
        value: https://contract.mexc.com
      - key: MEXC_API_KEY
        sync: false
      - key: MEXC_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
